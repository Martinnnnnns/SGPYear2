{% extends 'base_content.html' %}
{% block content %}

<div class="container mt-4">
    <h2>Confirm Deletion of All Slots</h2>
    <p>Are you sure you want to delete all of your availability slots?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete all slots</button>
        <a href="{% url 'schedule_sessions' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
