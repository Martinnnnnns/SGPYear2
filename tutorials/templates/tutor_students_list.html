{% extends 'base_content.html' %}
{% block content %}
<div class="container mt-5">
    <h1 class="mb-4">Your Students</h1>

    <div class="row justify-content-center mb-5">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body text-center">
                    <h5 class="card-title">Current Students</h5>
                    <p>View your active students with upcoming lessons</p>
                    <a href="{% url 'current_students' %}" class="btn btn-primary">View Current Students</a>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-body text-center">
                    <h5 class="card-title">Previous Students</h5>
                    <p>View your past students with completed lessons</p>
                    <a href="{% url 'previous_students' %}" class="btn btn-primary">View Previous Students</a>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center">
        <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back to Tutor Page</a>
    </div>
</div>
{% endblock %}
