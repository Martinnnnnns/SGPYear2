{% extends 'base_content.html' %}
{% block content %}

<div class="container-fluid mt-5">
  <!-- Page Header -->
  <div class="row">
    <div class="col-12 text-center">
      <h1 class="display-4 fw-bold">Your Students</h1>
      <p class="lead text-muted">View and manage your current and previous students.</p>
    </div>
  </div>

  <!-- Student Type Cards -->
  <div class="row mt-4 justify-content-center">
    <!-- Current Students Card -->
    <div class="col-lg-5 col-md-6 mb-4">
      <a href="{% url 'current_students' %}" class="text-decoration-none">
        <div class="card shadow">
          <div class="card-body text-center p-4">
            <i class="fas fa-user-graduate fa-2x text-primary mb-3"></i>
            <h6 class="card-title fw-bold">Current Students</h6>
            <p class="card-text text-muted small">View your active students with upcoming lessons</p>
          </div>
        </div>
      </a>
    </div>

    <!-- Previous Students Card -->
    <div class="col-lg-5 col-md-6 mb-4">
      <a href="{% url 'previous_students' %}" class="text-decoration-none">
        <div class="card shadow">
          <div class="card-body text-center p-4">
            <i class="fas fa-user-clock fa-2x text-primary mb-3"></i>
            <h6 class="card-title fw-bold">Previous Students</h6>
            <p class="card-text text-muted small">View your past students with completed lessons</p>
          </div>
        </div>
      </a>
    </div>
  </div>

  <!-- Back Button -->
  <div class="row mt-4">
    <div class="col-12 text-center">
      <a href="{% url 'dashboard' %}" class="btn btn-secondary px-4">Back to Tutor Page</a>
    </div>
  </div>
</div>

<style>
    .card {
      min-height: 150px;
      transition: transform 0.2s;
    }
    
    .card:hover {
      transform: translateY(-5px);
    }
  </style>
{% endblock %}
