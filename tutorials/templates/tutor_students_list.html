{% extends 'base_content.html' %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4">Your Students</h1>
    
    {% if students %}
        <div class="row">
            {% for student in students %}
                <div class="col-md-4 mb-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">{{ student.get_full_name }}</h5>
                            <p class="card-text">{{ student.email }}</p>
                            <a href="{% url 'student_profile_detail' student.id %}" 
                               class="btn btn-primary">View Profile</a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>You don't have any students yet.</p>
    {% endif %}
</div>
{% endblock %}
