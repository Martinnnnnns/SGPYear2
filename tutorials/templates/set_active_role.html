{% extends "base_content.html" %}

{% block content %}
<div class="container mt-5">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <h1 class="mb-4">Select Your Role</h1>
    <p class="text-muted">Choose a role to set it as your active role:</p>

    <form method="post">
        {% csrf_token %}
        <div class="d-flex flex-wrap">
            {% for role in roles %}
                <button 
                    type="submit" 
                    name="role" 
                    value="{{ role }}" 
                    class="btn btn-primary m-2">
                    Set as {{ role|title }}
                </button>
            {% endfor %}
        </div>
    </form>
</div>
{% endblock %}
